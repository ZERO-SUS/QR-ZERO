<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO SUS QR GENERATOR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#ff000020,transparent 40%),
    radial-gradient(circle at bottom right,#ff000020,transparent 40%),
    linear-gradient(135deg,#000000,#090909,#141414);
    overflow:hidden;
}

/* Animated background glow */

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#ff0000;
    filter:blur(250px);
    opacity:.12;
    animation:float 8s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translate(0,0);
    }
    50%{
        transform:translate(80px,-50px);
    }
}

.container{
    width:420px;
    max-width:90%;
    padding:35px;
    text-align:center;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    box-shadow:
    0 0 30px rgba(255,0,0,0.15),
    0 0 60px rgba(255,0,0,0.05);

    animation:appear .8s ease;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    color:white;
    margin-bottom:10px;
    font-size:2rem;
    letter-spacing:2px;
}

.subtitle{
    color:#aaa;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#111;
    color:white;
    font-size:15px;
    margin-bottom:15px;
}

input::placeholder{
    color:#777;
}

button{
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.generate-btn{
    width:100%;
    padding:15px;
    background:linear-gradient(135deg,#ff0000,#b30000);
    color:white;
    font-size:16px;
}

.generate-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(255,0,0,.5);
}

.download-btn{
    display:none;
    margin-top:15px;
    padding:12px 22px;
    background:white;
    color:black;
}

.download-btn:hover{
    transform:scale(1.05);
}

#qrcode{
    margin-top:25px;
    display:flex;
    justify-content:center;
    animation:fade .5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:12px;
}

</style>
</head>
<body>

<div class="container">

    <h1>ZERO SUS</h1>
    <p class="subtitle">QR GENERATOR</p>

    <input
    type="text"
    id="link"
    placeholder="Paste your URL here...">

    <button
    class="generate-btn"
    onclick="generateQR()">
    Generate QR Code
    </button>

    <div id="qrcode"></div>

    <button
    id="downloadBtn"
    class="download-btn"
    onclick="downloadQR()">
    Download QR
    </button>

    <div class="footer">
        Made by ZERO SUS
    </div>

</div>

<script>

function generateQR(){

    const link=document.getElementById("link").value;
    const qr=document.getElementById("qrcode");

    qr.innerHTML="";

    if(link.trim()===""){
        alert("Enter a URL first!");
        return;
    }

    new QRCode(qr,{
        text:link,
        width:220,
        height:220
    });

    setTimeout(()=>{
        document.getElementById("downloadBtn").style.display="inline-block";
    },300);
}

function downloadQR(){

    const img=document.querySelector("#qrcode img");

    if(!img) return;

    const a=document.createElement("a");
    a.href=img.src;
    a.download="zerosus-qr.png";
    a.click();
}

</script>

</body>
</html>
