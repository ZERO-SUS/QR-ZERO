<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO SUS QR GENERATOR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#000000,#090909,#140000,#000000);
}

/* Floating particles */

.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:.6;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-10vh);
    }
}

/* Red glow */

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:red;
    border-radius:50%;
    filter:blur(220px);
    opacity:.15;
    z-index:0;
}

/* Main Card */

.container{
    position:relative;
    z-index:2;
    width:420px;
    max-width:92%;
    padding:35px;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;

    text-align:center;

    box-shadow:
    0 0 30px rgba(255,0,0,.15),
    0 0 60px rgba(255,0,0,.08);

    animation:appear .8s ease;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    color:white;
    font-size:2rem;
    margin-bottom:25px;
    text-shadow:0 0 20px rgba(255,0,0,.5);
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:20px;

    background:#0f0f0f;
    color:white;
    font-size:15px;

    margin-bottom:18px;
}

input::placeholder{
    color:#777;
}

button{
    border:none;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.generate-btn{
    width:100%;
    padding:15px;

    border-radius:50px;

    background:linear-gradient(135deg,#ff0000,#8b0000);
    color:white;
    font-size:16px;
}

.generate-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(255,0,0,.6);
}

.download-btn{
    margin-top:15px;
    padding:12px 24px;

    border-radius:50px;

    background:white;
    color:black;

    display:none;
}

.download-btn:hover{
    transform:scale(1.05);
}

#qrcode{
    margin-top:25px;
    display:flex;
    justify-content:center;
}

#qrcode img,
#qrcode canvas{
    border-radius:12px;
    animation:pop .4s ease;
}

@keyframes pop{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:12px;
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">

    <h1>ZERO SUS QR GENERATOR</h1>

    <input
    type="text"
    id="text"
    placeholder="Enter any text, link, username, message...">

    <button
    class="generate-btn"
    onclick="generateQR()">
    Generate QR Code
    </button>

    <div id="qrcode"></div>

    <button
    id="downloadBtn"
    class="download-btn"
    onclick="downloadQR()">
    Download QR
    </button>

    <div class="footer">
        Made by ZERO SUS
    </div>

</div>

<script>

// Create particles

for(let i=0;i<60;i++){

    const p=document.createElement("div");

    p.classList.add("particle");

    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(8+Math.random()*12)+"s";
    p.style.animationDelay=Math.random()*10+"s";

    document.body.appendChild(p);
}

function generateQR(){

    const text=document.getElementById("text").value.trim();

    const qr=document.getElementById("qrcode");

    qr.innerHTML="";

    if(text===""){
        alert("Enter some text or a URL.");
        return;
    }

    new QRCode(qr,{
        text:text,
        width:220,
        height:220,
        correctLevel:QRCode.CorrectLevel.H
    });

    document.getElementById("downloadBtn").style.display="inline-block";
}

function downloadQR(){

    const canvas=document.querySelector("#qrcode canvas");

    if(canvas){

        const link=document.createElement("a");

        link.download="ZERO-SUS-QR.png";
        link.href=canvas.toDataURL();

        link.click();
    }
}
</script>

</body>
</html>
